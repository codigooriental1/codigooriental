<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuestas</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#6D1A1A;">
    <div class="container">
        <a class="navbar-brand" href="#">Encuesta de Satisfacción</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Encuesta de Satisfacción</h2>

    <form>

        <div class="mb-3">
            <label class="form-label">
                ¿Cómo califica la atención recibida?
            </label>

            <select class="form-select">
                <option>Excelente</option>
                <option>Buena</option>
                <option>Regular</option>
                <option>Mala</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Comentarios
            </label>

            <textarea class="form-control" rows="4"></textarea>
        </div>

        <button class="btn btn-danger">
            Enviar
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</body>
</html>
