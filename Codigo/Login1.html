<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#6D1A1A;">
    <div class="container">
        <a class="navbar-brand" href="index.html">Hospital de Clinicas</a>
    </div>
</nav>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Iniciar Sesión
                    </h2>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                Usuario
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Ingrese su usuario">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Contraseña
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                placeholder="Ingrese su contraseña">

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-danger">
                                Ingresar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="text-center mt-5 mb-3 text-secondary">
    Sistema de Gestión Documental - Hospital de  Clinicas
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</body>
</html>
